name: Slack Notify on Report

on:
  push:
    paths:
      - 'reports/**.md'
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          DATE=$(date +%Y-%m-%d)
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"AI 교육 트렌드 리포트 ${DATE}\nhttps://github.com/imjoeyu-web/ai-edutrend-research/blob/main/reports/${DATE}.md\"}" \
            "$SLACK_WEBHOOK_URL"
