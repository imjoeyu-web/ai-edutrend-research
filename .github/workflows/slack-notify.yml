name: Slack Notify on Report

on:
  push:
    paths:
      - 'reports/**.md'
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send Slack notification
        run: |
          DATE=$(date +%Y-%m-%d)
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\": \"*📚 AI 교육 트렌드 리포트 — ${DATE}*\n\n🔗 전체 리포트: https://github.com/imjoeyu-web/ai-edutrend-research/blob/main/reports/${DATE}.md\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
